<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buzzer Peserta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-900 h-screen w-screen flex flex-col items-center justify-center overflow-hidden touch-none text-white font-sans p-6">

    <div id="joinArea" class="w-full max-w-sm bg-gray-800 p-8 rounded-2xl shadow-xl text-center">
        <h2 class="text-2xl font-bold mb-2">Gabung Cerdas Cermat</h2>
        <p class="text-gray-400 text-sm mb-6">Room ID: <span id="roomIdDisplay" class="text-blue-400 font-bold">...</span></p>
        
        <input type="text" id="teamNameInput" placeholder="Masukkan Nama Tim..." class="w-full px-4 py-3 rounded-xl bg-gray-700 border border-gray-600 text-white text-center font-bold text-lg outline-none focus:border-blue-500 mb-4" autocomplete="off">
        
        <button onclick="joinRoom()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition-all text-lg">
            Masuk Arena
        </button>
    </div>

    <div id="buzzerArea" class="hidden flex-col items-center w-full">
        <h1 id="namaTim" class="text-3xl font-black text-white mb-8 bg-gray-800 px-6 py-2 rounded-full border border-gray-700">Tim Kamu</h1>
        
        <button id="btnBuzzer" onclick="tekanBuzzer()" class="w-72 h-72 rounded-full bg-red-600 border-[12px] border-red-800 shadow-[0_0_60px_rgba(220,38,38,0.4)] active:bg-red-700 active:border-red-900 active:scale-95 transition-all outline-none flex items-center justify-center select-none">
            <span class="text-white font-black text-4xl tracking-widest uppercase pointer-events-none"></span>
        </button>
        
        <p id="status" class="text-gray-400 mt-10 font-semibold text-lg text-center px-4">Siap untuk ditekan...</p>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG (GANTI DENGAN MILIKMU SAMA SEPERTI INDEX.HTML) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDEeDXBl8dUiObp5tPlbI2Itztra8jYxfE",
            authDomain: "cerdas-cermat-bpbd.firebaseapp.com",
            databaseURL: "https://cerdas-cermat-bpbd-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cerdas-cermat-bpbd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ambil Room ID dari URL param (?room=XYZ)
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        
        if(!roomId) {
            document.body.innerHTML = "<h2 class='text-red-500 text-2xl font-bold text-center mt-20'>Error: QR Code Tidak Valid atau Room ID Hilang.</h2>";
        } else {
            document.getElementById('roomIdDisplay').innerText = roomId;
        }

        let myTeamId = null;

        // Cek apakah sebelumnya sudah daftar (biar aman kalau ter-refresh)
        const savedTeamId = localStorage.getItem(`cerdascermat_${roomId}_id`);
        const savedTeamName = localStorage.getItem(`cerdascermat_${roomId}_name`);
        
        if(savedTeamId && savedTeamName) {
            // Langsung masuk layar buzzer
            myTeamId = savedTeamId;
            tampilkanBuzzer(savedTeamName);
        }

        // --- 2. LOGIKA DAFTAR TIM ---
        function joinRoom() {
            const nama = document.getElementById('teamNameInput').value.trim();
            if(nama === '') { alert('Nama tim tidak boleh kosong!'); return; }

            // Push (tambah data) ke Firebase di bawah nama Room
            const refBaru = db.ref(`rooms/${roomId}/teams`).push();
            myTeamId = refBaru.key; // Dapatkan ID unik acak dari Firebase
            
            refBaru.set({ name: nama });

            // Simpan di memori lokal HP
            localStorage.setItem(`cerdascermat_${roomId}_id`, myTeamId);
            localStorage.setItem(`cerdascermat_${roomId}_name`, nama);

            tampilkanBuzzer(nama);
        }

        function tampilkanBuzzer(nama) {
            document.getElementById('joinArea').classList.add('hidden');
            document.getElementById('buzzerArea').classList.remove('hidden');
            document.getElementById('buzzerArea').classList.add('flex');
            document.getElementById('namaTim').innerText = nama;
            
            // Dengarkan perintah reset dari panitia
            dengarkanStatusBuzzer();
        }

        // --- 3. LOGIKA TOMBOL BUZZER ---
        const btnBuzzer = document.getElementById('btnBuzzer');
        const statusEl = document.getElementById('status');
        let sudahDitekan = false;

        function tekanBuzzer() {
            if(sudahDitekan) return;
            
            // Lempar data ke Firebase bahwa tim ini menekan buzzer
            db.ref(`rooms/${roomId}/buzzer_winner`).set(myTeamId);
            
            // Ubah UI
            sudahDitekan = true;
            btnBuzzer.classList.replace('bg-red-600', 'bg-blue-600');
            btnBuzzer.classList.replace('border-red-800', 'border-blue-800');
            statusEl.innerText = "Sinyal terkirim! Cek layar utama...";
        }

        function dengarkanStatusBuzzer() {
            db.ref(`rooms/${roomId}/buzzer_winner`).on('value', (snapshot) => {
                const winnerId = snapshot.val();
                
                if (winnerId === null) {
                    // Panitia mereset tombol
                    sudahDitekan = false;
                    btnBuzzer.classList.replace('bg-blue-600', 'bg-red-600');
                    btnBuzzer.classList.replace('border-blue-800', 'border-red-800');
                    btnBuzzer.classList.replace('bg-gray-600', 'bg-red-600');
                    btnBuzzer.classList.replace('border-gray-800', 'border-red-800');
                    statusEl.innerText = "Siap untuk ditekan...";
                } 
                else if (winnerId !== myTeamId) {
                    // Tim lain yang duluan pencet, tombol kita di-lock dan jadi abu-abu
                    sudahDitekan = true;
                    btnBuzzer.classList.replace('bg-red-600', 'bg-gray-600');
                    btnBuzzer.classList.replace('border-red-800', 'border-gray-800');
                    statusEl.innerText = "Kalah cepat! Tim lain sedang menjawab.";
                }
            });
        }
    </script>
</body>
</html>
